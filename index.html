    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --accent-purple: #8b5cf6;
            --warning-bg: #fff7ed;
            --warning-border: #f97316;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
        }

        /* Modern Navigation */
        nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { 
            font-size: 1.25rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--primary-color), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px; 
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--primary-color); }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 50px 20px 30px;
            max-width: 700px;
            margin: 0 auto;
        }
        .hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; color: var(--text-dark); }
        .hero p { color: var(--text-light); font-size: 1rem; line-height: 1.6; }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 40px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            flex-grow: 1;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: repeat(2, 1fr); }
        }

        /* Cards */
        .app-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .app-card:hover { 
            transform: translateY(-4px); 
            box-shadow: var(--shadow-lg); 
            border-color: rgba(59, 130, 246, 0.2);
        }

        .card-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .free-tag {
            background: var(--primary-color);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            margin-right: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .card-info { flex-grow: 1; }
        .card-title { font-size: 1rem; font-weight: 700; color: var(--text-dark); }
        .card-subtitle { font-size: 0.75rem; color: var(--text-light); margin-top: 3px; }

        .toggle-icon {
            width: 28px; height: 28px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-light);
            transition: transform 0.3s ease, background 0.2s;
            font-size: 0.8rem;
        }
        .app-card:hover .toggle-icon { background: #e2e8f0; }

        .card-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8fafc;
        }

        .details-inner { padding: 20px; }

        .cred-row {
            display: flex;
            align-items: center;
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            transition: border-color 0.2s;
        }
        .cred-row:hover { border-color: var(--primary-color); }

        .cred-label { font-size: 0.7rem; font-weight: 700; color: var(--text-light); width: 60px; text-transform: uppercase; letter-spacing: 0.5px; }
        .cred-value { font-family: 'Courier New', monospace; font-size: 0.9rem; color: var(--text-dark); flex-grow: 1; word-break: break-all; }
        .copy-btn { cursor: pointer; opacity: 0.5; transition: opacity 0.2s; margin-left: 10px; font-size: 1.1rem; }
        .copy-btn:hover { opacity: 1; transform: scale(1.1); }

        .cookie-box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .cookie-text {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: var(--text-dark);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
        }

        .copy-cookie-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .copy-cookie-btn:hover { background: var(--primary-hover); }

        .steps-list { margin: 15px 0; padding-left: 20px; line-height: 1.7; font-size: 0.9rem; color: var(--text-dark); }
        .steps-list li { margin-bottom: 8px; }
        .steps-list a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
        .steps-list a:hover { text-decoration: underline; }

        .warning-box {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            padding: 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem;
            color: #9a3412;
            line-height: 1.6;
            margin-top: 15px;
        }
        .warning-box ul { list-style: none; padding: 0; margin: 0; }
        .warning-box li { margin-bottom: 6px; }

        /* Footer */
        footer {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
        }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-light); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .footer-links a:hover { color: var(--primary-color); }
        .copyright { color: var(--text-light); font-size: 0.8rem; }
    </style>

        function toggleCard(header) {
            const details = header.nextElementSibling;
            const icon = header.querySelector('.toggle-icon');
            
            if (details.style.maxHeight) {
                details.style.maxHeight = null;
                icon.style.transform = 'rotate(0deg)';
            } else {
                document.querySelectorAll('.card-details').forEach(d => d.style.maxHeight = null);
                document.querySelectorAll('.toggle-icon').forEach(i => i.style.transform = 'rotate(0deg)');
                
                details.style.maxHeight = details.scrollHeight + "px";
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerText;
                btn.innerText = '✅';
                setTimeout(() => btn.innerText = original, 2000);
            });
        }

        function copyCookie(index, btn) {
            const cookieText = document.getElementById(`cookie-${index}`).innerText;
            navigator.clipboard.writeText(cookieText).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }
